<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Breadcrumb Option 2: Clean Ribbon (With Context)</title>
  <link rel="stylesheet" href="./globalcss.css">
<style>
    body {
      margin: 0;
      font-family: var(--font-body, sans-serif);
    }
    
    /* Mock Top Header (Dark Maroon) */
    .mock-top-header {
      background-color: var(--brand-maroon, #8a1538);
      color: white;
      padding: 15px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .mock-logo-area {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .mock-logo {
      width: 65px;
      height: 65px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      text-align: center;
    }
    .mock-title h2 {
      margin: 0 0 4px 0;
      font-family: var(--font-display, serif);
      font-size: 1.5rem;
      font-weight: 600;
    }
    .mock-subtitle {
      margin: 0;
      font-size: 0.8rem;
      color: #ffd0d9;
    }

    /* Hero Banner Setup */
    .hero-banner {
      /* Subtle dark overlay to preserve actual photo colors without being too blackish */
      background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.5)), url('https://preproladyirwin.whitecodetech.com/breadcrumb.png') center/cover;
      padding: 120px 5% 60px 5%; /* Top padding pushes content below the main menu */
      min-height: 200px;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
    }
    
    /* Mock Main Menu Overlay */
    .mock-main-menu {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      padding: 15px 5%;
      display: flex;
      gap: 20px;
      align-items: center;
      color: white;
      font-size: 0.9rem;
      font-weight: 500;
      box-sizing: border-box;
    }
    .mock-menu-active {
      background: white;
      color: var(--brand-maroon);
      padding: 6px 12px;
      border-radius: 2px;
    }

    .hero-banner h1 {
      color: white;
      font-family: var(--font-display, serif);
      font-size: 3.5rem;
      margin: 0;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    
    /* Option 2: Ribbon Setup */
    .breadcrumb-ribbon {
      width: 100%;
      background-color: var(--brand-cream, #f9f5f0); 
      border-bottom: 1px solid rgba(0,0,0,0.05);
      padding: 12px 5%;
      font-family: var(--font-body, sans-serif);
      font-size: 0.85rem;
    }

    .breadcrumb-ribbon nav {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #666;
    }

    .breadcrumb-ribbon a {
      color: var(--brand-maroon, #8a1538);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .breadcrumb-ribbon a:hover {
      text-decoration: underline;
    }

    .breadcrumb-ribbon .bc-separator {
      width: 14px;
      height: 14px;
      stroke: #999;
    }

    .breadcrumb-ribbon .bc-current {
      color: #333;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- Mock Top Header -->
  <header class="mock-top-header">
    <div class="mock-logo-area">
      <div class="mock-logo">LOGO</div>
      <div class="mock-title">
        <h2>Lady Irwin College, Delhi</h2>
        <p class="mock-subtitle">University of Delhi | NAAC Accreditation A+</p>
      </div>
    </div>
  </header>

  <!-- Hero Banner -->
  <div class="hero-banner">
    <!-- Mock Main Menu -->
    <div class="mock-main-menu">
      <span>Home</span>
      <span class="mock-menu-active">About ▾</span>
      <span>Departments ▾</span>
      <span>Programmes</span>
      <span>Admissions ▾</span>
      <span>Facilities ▾</span>
    </div>

    <!-- Page Title -->
    <h1>Reports</h1>
  </div>

  <!-- Option 2 Breadcrumbs -->
  <div class="breadcrumb-ribbon">
    <nav class="breadcrumb-nav" aria-label="breadcrumb">
      <a href="#">Home</a>
      <svg class="bc-separator" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
      <a href="#">About</a>
      <svg class="bc-separator" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
      <a href="#">Organization</a>
      <svg class="bc-separator" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
      <span class="bc-current">Reports</span>
    </nav>
  </div>

  <!-- Regular Content Below -->
  <section class="stats-bar">
    <div class="stat-item">
      <svg class="stat-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      <div><p class="stat-value">10+</p><p class="stat-label">Reports Published</p></div>
    </div>
  </section>

</body>
</html>
