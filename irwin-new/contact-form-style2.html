<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form - Style 2</title>
  <!-- Base CSS -->
  <link rel="stylesheet" href="./globalcss.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- =============================== DEVELOPER CSS START =========================== -->
  <style>
/* ============================================================== 
   CONTACT US FORM - STYLE 2 (CLEAN)
   ============================================================== */

.contact-style2 {
    width: 100%;
}

.contact-style2 .form-group {
    margin-bottom: 24px;
    width: 100%;
    display: block;
}

.contact-style2 label {
    font-family: var(--font-main, sans-serif);
    color: #444;
    font-size: 15px;
    font-weight: 600;
    display: block;
    margin-bottom: 8px;
}

.contact-style2 label .required {
    color: var(--brand-maroon, #741C02);
    margin-left: 4px;
}

.contact-style2 .form-input,
.contact-style2 textarea {
    background-color: #ffffff;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-family: var(--font-main, sans-serif);
    font-size: 15px;
    color: #333;
    font-weight: 400;
    box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.05);
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
    padding: 14px 16px;
    width: 100%;
    display: block;
    box-sizing: border-box;
}

.contact-style2 .form-input:focus,
.contact-style2 textarea:focus {
    background-color: #fff;
    border-color: var(--brand-alt, #DF672B);
    box-shadow: 0 0 0 3px rgba(223, 103, 43, 0.15);
    outline: none;
}

.contact-style2 textarea {
    min-height: 140px;
    resize: vertical;
}

.contact-style2 .submit-wrapper {
    margin-top: 32px;
}

.contact-style2 .submit-btn {
    background-color: var(--brand-maroon, #741C02);
    color: #fff;
    border: none;
    padding: 16px 32px;
    font-family: var(--font-main, sans-serif);
    font-size: 16px;
    font-weight: 600;
    border-radius: 6px;
    width: 100%;
    transition: all 0.3s ease;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    box-sizing: border-box;
}

.contact-style2 .submit-btn:hover {
    background-color: var(--brand-alt, #DF672B);
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(223, 103, 43, 0.2);
}
  </style>
  <!-- =============================== DEVELOPER CSS END ============================= -->
</head>
<body style="margin: 0; padding: 50px; background: #f0ece3; font-family: sans-serif;">

  <!-- =============================== DEMO WRAPPER ONLY =============================== -->
  <div style="max-width: 600px; margin: 0 auto; background: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">

    <!-- =============================== DEVELOPER CODE START =========================== -->
    <div class="contact-style2">
      <form>
        <div class="form-group">
          <label for="name">Full Name <span class="required">*</span></label>
          <input type="text" id="name" class="form-input" placeholder="Enter your full name" required>
        </div>
        
        <div class="form-group">
          <label for="email">Email Address <span class="required">*</span></label>
          <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" class="form-input" placeholder="Enter your phone number">
        </div>

        <div class="form-group">
          <label for="message">Message <span class="required">*</span></label>
          <textarea id="message" class="form-input" placeholder="How can we help?" required></textarea>
        </div>

        <div class="submit-wrapper">
          <button type="submit" class="submit-btn" aria-label="Send Message">Send Message</button>
        </div>
      </form>
    </div>
    <!-- =============================== DEVELOPER CODE END ============================= -->

  </div>
  <!-- ============================= END DEMO WRAPPER ONLY ============================= -->

</body>
</html>
